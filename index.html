<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JazeeraMap - Maldives Data</title>

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- MAPLIBRE CSS -->
<link href="https://unpkg.com/maplibre-gl@5.7.0/dist/maplibre-gl.css" rel="stylesheet">

<!-- APP CSS -->
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ==========================
     LOCK SCREEN
     Client-side password gate. This only deters casual
     visitors — the password lives in js/modules/lock.js
     and is visible to anyone who views page source. Do not
     rely on this to protect anything genuinely sensitive.
=========================== -->
<div id="lockScreen">
    <form id="lockForm">
        <div id="lockLogo">🌊 JazeeraMap</div>
        <p>This site is password protected.</p>
        <input type="password" id="lockPassword" placeholder="Enter password" autocomplete="off" autofocus>
        <button type="submit">Enter</button>
        <div id="lockError">Incorrect password. Try again.</div>
    </form>
</div>

<!-- ========================== APP (hidden until unlocked) ========================== -->
<div id="appContent">

    <header>
        <div id="logo"><span class="logo-icon">🌊</span><span class="logo-text">JazeeraMap</span></div>

        <!-- SEARCH -->
        <div id="search">
            <select id="searchLayerFilter" title="Search within...">
                <option value="all">All Layers</option>
            </select>
            <div id="searchInputWrap">
                <input id="globalSearch" type="text" placeholder="Search island, reef, plot, address..." autocomplete="off">
                <div id="searchSuggestions"></div>
            </div>
        </div>

        <button id="navigateOpenBtn" title="Get directions">
            <span class="nav-icon">🧭</span><span class="nav-label">Navigate</span>
        </button>
    </header>

    <!-- MOBILE BUTTON -->
    <button id="mobileMenuBtn">☰</button>

    <!-- ========================== NAVIGATION PANEL ========================== -->
    <div id="navPanelOverlay"></div>
    <div id="navPanel">
        <div id="navPanelHeader">
            <h3>🧭 Get Directions</h3>
            <button id="navPanelClose">&times;</button>
        </div>

        <div id="navPanelBody">

            <div class="navField">
                <label>From</label>
                <div class="navInputRow">
                    <input type="text" id="navOriginInput" placeholder="Current location, address, or plot..." autocomplete="off">
                    <button id="navUseLocationBtn" title="Use my current location">📍</button>
                    <button id="navPickOriginBtn" title="Pick a point on the map">🗺️</button>
                </div>
                <div class="navSuggestions" id="navOriginSuggestions"></div>
            </div>

            <button id="navSwapBtn" title="Swap origin and destination">⇅</button>

            <div class="navField">
                <label>To</label>
                <div class="navInputRow">
                    <input type="text" id="navDestinationInput" placeholder="Address, plot, or island..." autocomplete="off">
                    <button id="navPickDestinationBtn" title="Pick a point on the map">🗺️</button>
                </div>
                <div class="navSuggestions" id="navDestinationSuggestions"></div>
            </div>

            <div id="navPickHint"></div>

            <button id="navGoBtn" disabled>Get Directions</button>
        </div>
    </div>

    <!-- ========================== MAIN ========================== -->
    <div id="container">

        <!-- SIDEBAR -->
        <aside id="sidebar">
            <h2>📂 Data Catalog</h2>
            <!-- ui.js builds the catalog here -->
        </aside>

        <!-- MAP -->
        <main>
            <div id="map"></div>
        </main>

    </div>

    <!-- FOOTER -->
    <footer>Version 0.8.0</footer>

</div>

<!-- ==========================
     JAVASCRIPT — ORDER IS IMPORTANT
     Local data is now fetched by LayerManager itself
     (driven by datasetRegistry.js), so there's no separate
     "load data before registry" script tag anymore.
=========================== -->

<!-- LOCK SCREEN (runs first, blocks everything else until unlocked) -->
<script src="js/modules/lock.js"></script>

<!-- MAP ENGINE -->
<script src="https://unpkg.com/maplibre-gl@5.7.0/dist/maplibre-gl.js"></script>

<!-- REGISTRIES -->
<script src="js/modules/datasetRegistry.js"></script>
<script src="js/modules/basemapRegistry.js"></script>

<!-- MANAGERS -->
<script src="js/modules/popupManager.js"></script>
<script src="js/modules/searchManager.js"></script>
<script src="js/modules/queryManager.js"></script>
<script src="js/modules/layerManager.js"></script>
<script src="js/modules/basemapManager.js"></script>
<script src="js/modules/locationManager.js"></script>
<script src="js/modules/navigationManager.js"></script>

<!-- UI -->
<script src="js/modules/ui.js"></script>

<!-- MAIN APP -->
<script src="js/app.js"></script>

</body>
</html>
